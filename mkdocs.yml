site_name: Tim Jones - Guides
site_url: https://sfc-gh-timjones.github.io/tutorials
repo_url: https://github.com/sfc-gh-timjones/tutorials
repo_name: sfc-gh-timjones/tutorials

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables

plugins:
  - search

nav:
  - Home: index.md
  - Fivetran + Iceberg + Snowflake: fivetran-iceberg/index.md
